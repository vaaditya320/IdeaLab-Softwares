<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Lab Softwares</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .navbar {
            background-color: transparent;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
            padding: 20px;
        }
        .software-button {
            display: block;
            width: 100%;
            background-color: #ff7eb3;
            color: #fff;
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            margin: 10px 0;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(255, 126, 179, 0.4);
        }
        .software-button:hover {
            background-color: #ff4b81;
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 75, 129, 0.5);
            color: #fff; /* Ensures the text stays white */
            text-decoration: none; /* Removes the underline */
        }
        .software-button:active {
            transform: translateY(-2px) scale(1);
            box-shadow: 0 3px 10px rgba(255, 75, 129, 0.3);
        }
    </style>
</head>
<body>
    <div class="navbar">
        IDEA LAB SOFTWARES
    </div>
    <div class="container">
        <a href="https://drive.google.com/file/d/1N2wKeN4ua3BZ_p96IzRW6EUfbBSB8bSP/view?usp=sharing" class="software-button" target="_blank" rel="noreferrer">RDworks</a>
        <a href="https://github.com/Ultimaker/Cura/releases/download/5.8.1/UltiMaker-Cura-5.8.1-win64-X64.exe" class="software-button" target="_blank" rel="noreferrer">Ultimaker CURA</a>
        <a href="http://eagle.autodesk.com/eagle/download-software/162" class="software-button" target="_blank" rel="noreferrer">EAGLE CAD</a>
        <a href="https://github.com/KiCad/kicad-source-mirror/releases/download/8.0.6/kicad-8.0.6-x86_64.exe" class="software-button" target="_blank" rel="noreferrer">Ki CAD</a>
        <a href="https://downloads.arduino.cc/arduino-ide/arduino-ide_latest_Windows_64bit.exe" class="software-button" target="_blank" rel="noreferrer">Arduino IDE</a>
    </div>

    <!-- Bootstrap JS and dependencies (for optional interactive components) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
